server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Prevent nginx from issuing redirects with the internal port (8080)
    # when it encounters pre-rendered subdirectories like /blog/ or /about/
    absolute_redirect off;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Serve pre-rendered HTML for marketing pages, fall back to SPA index.html.
    # $uri/index.html must come before $uri/ to avoid nginx issuing a 301
    # redirect to add a trailing slash when it finds a pre-rendered directory.
    location / {
        try_files $uri $uri/index.html /index.html;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
