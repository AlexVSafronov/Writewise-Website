server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Prevent nginx from issuing redirects with the internal port (8080)
    # when it encounters pre-rendered subdirectories like /blog/ or /about/
    absolute_redirect off;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── Canonical redirects ───────────────────────────────────────────────────

    # Redirect HTTP → HTTPS (GCP Load Balancer terminates SSL and sets this header)
    if ($http_x_forwarded_proto = "http") {
        return 301 https://$host$request_uri;
    }

    # Redirect www → non-www (preserves path and query string)
    if ($http_host = "www.write-wise.com") {
        return 301 https://write-wise.com$request_uri;
    }

    # Remove trailing slashes on all paths except root
    rewrite ^(.+)/$ $1 permanent;

    # Old WordPress author/tag/category URLs → homepage
    location ~* ^/(author|tag|category|wp-content|wp-admin|wp-includes)/ {
        return 301 https://write-wise.com/;
    }

    # Old privacy/terms URL slugs → canonical routes
    location = /privacy-policy { return 301 /privacy; }
    location = /user-agreement { return 301 /terms; }

    # ── Asset caching ─────────────────────────────────────────────────────────

    # Cache static assets (hashed filenames — safe to cache forever)
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache HTML — ensures users always get fresh deployments
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    }

    # ── Routing ───────────────────────────────────────────────────────────────

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # /app/* routes are client-side only (never pre-rendered) — always serve
    # the React shell so the router can handle them in the browser.
    location /app/ {
        try_files $uri $uri/index.html /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    }

    # Marketing routes: serve the pre-rendered HTML file if it exists, otherwise
    # fall through to a real 404. This converts "soft 404" (HTTP 200 + not-found
    # content) into a proper HTTP 404 that Google handles correctly.
    location / {
        try_files $uri $uri/index.html =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    }

    # For 404s, serve the React shell so the NotFound component renders.
    # The HTTP status stays 404 (not overridden), which Google treats as a
    # hard 404 and removes from its index.
    error_page 404 /index.html;
}
